<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaidDidce Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app-container">

        <!-- ══════════════════════════════════
             AUTH VIEW — Login / Register
        ══════════════════════════════════ -->
        <div id="auth-view" class="view active">
            <div class="login-box">
                <div class="logo">
                    <div class="logo-circle"></div>
                    <h1>LAUNCHER</h1>
                </div>
                <p class="subtitle" id="auth-subtitle">Sign in to continue</p>

                <!-- Login Form -->
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn" id="login-submit-btn">Sign In</button>
                    <p class="toggle-auth">Don't have an account? <a href="#" id="go-to-register">Register</a></p>
                </form>

                <!-- Register Form -->
                <form id="register-form" style="display: none;">
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Your username" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn" id="register-submit-btn">Create Account</button>
                    <p class="toggle-auth">Already have an account? <a href="#" id="go-to-login">Sign In</a></p>
                </form>

                <div id="auth-error" class="error-message"></div>
                <div id="auth-success" class="success-message"></div>
            </div>
        </div>

        <!-- ══════════════════════════════════
             MAIN VIEW — Sidebar + Content
        ══════════════════════════════════ -->
        <div id="main-view" class="view" style="display: none; flex-direction: row;">

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="logo">
                    <span class="logo-icon">🚀</span>
                    <h1>Launcher</h1>
                </div>

                <nav class="nav-menu">
                    <ul>
                        <li class="nav-item active" data-view="store" id="nav-store">
                            <span class="nav-icon">🏪</span>
                            <span>Store</span>
                        </li>
                        <li class="nav-item" data-view="library" id="nav-library">
                            <span class="nav-icon">🎮</span>
                            <span>Library</span>
                        </li>
                    </ul>
                </nav>

                <div class="user-info">
                    <div class="user-avatar" id="user-avatar-letter">U</div>
                    <div class="user-details">
                        <span id="display-email">user@example.com</span>
                        <small>Player</small>
                    </div>
                    <button id="logout-btn" title="Sign Out">⎋</button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content">
                <header class="content-header">
                    <h2 id="view-title">Global Store</h2>
                    <div class="search-bar">
                        <span class="search-icon">⌕</span>
                        <input type="text" id="search-input" placeholder="Search games...">
                        <button id="search-btn" title="Search">→</button>
                    </div>
                </header>

                <div id="games-grid" class="games-grid"></div>
                <div id="games-loading" class="loading-message" style="display:none;">
                    <div class="spinner"></div>
                    <span>Loading...</span>
                </div>
            </main>
        </div>

        <!-- ══════════════════════════════════
             GAME DETAIL MODAL
        ══════════════════════════════════ -->
        <div id="game-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button id="close-modal" class="close-btn">✕</button>

                <div class="modal-header">
                    <div class="modal-game-icon" id="modal-icon-letter">G</div>
                    <div>
                        <h2 id="modal-game-title">Game Title</h2>
                        <span id="modal-game-badge" class="game-badge"></span>
                    </div>
                </div>

                <p id="modal-game-desc" class="game-description">Loading description...</p>

                <div class="modal-actions">
                    <button id="download-btn" class="primary-btn">Download Latest Version</button>
                </div>

                <div id="download-progress-container" style="display: none;">
                    <p id="download-status">Starting download...</p>
                    <div class="progress-bar-bg">
                        <div id="download-progress-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="renderer.js"></script>
</body>
</html>
