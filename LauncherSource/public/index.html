<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaidDidce Launcher</title>
    <!-- Google Fonts para tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app-container">
        <!-- Pantalla de Autenticación (Login/Registro) -->
        <div id="auth-view" class="view active">
            <div class="login-box">
                <div class="logo">
                    <div class="logo-circle"></div>
                    <h1>LAUNCHER</h1>
                </div>
                <p class="subtitle" id="auth-subtitle">Inicia sesión para continuar</p>
                
                <!-- Formulario Login -->
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="tu@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn">Iniciar Sesión</button>
                    <p class="toggle-auth">¿No tienes cuenta? <a href="#" id="go-to-register">Regístrate</a></p>
                </form>

                <!-- Formulario Registro -->
                <form id="register-form" style="display: none;">
                    <div class="input-group">
                        <label for="reg-username">Nombre de Usuario</label>
                        <input type="text" id="reg-username" placeholder="Tu username" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" placeholder="tu@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="primary-btn">Crear Cuenta</button>
                    <p class="toggle-auth">¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia Sesión</a></p>
                </form>

                <div id="auth-error" class="error-message"></div>
                <div id="auth-success" class="success-message" style="color: #10b981; font-size: 13px; margin-top: 16px; text-align: center;"></div>
            </div>
        </div>

        <!-- Pantalla de Biblioteca (Main View) -->
        <div id="main-view" class="view" style="display: none; flex-direction: column;">
            <!-- Navbar Header -->
            <header class="library-header">
                <div class="logo">
                    <div class="logo-circle" style="width: 24px; height: 24px;"></div>
                    <h2 style="font-size: 16px; margin: 0;">LAUNCHER</h2>
                </div>
                
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar juego...">
                    <button id="search-btn">🔍</button>
                </div>

                <div class="user-profile">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <span id="display-email" class="name">Usuario</span>
                        <a href="#" id="logout-btn" class="logout">Cerrar Sesión</a>
                    </div>
                </div>
            </header>

            <!-- Grid de Juegos -->
            <main class="library-content">
                <h2 class="section-title">Todos los Juegos</h2>
                <div id="games-grid" class="games-grid">
                    <!-- Los juegos se inyectarán aquí -->
                </div>
                <div id="games-loading" class="loading-message">Cargando biblioteca...</div>
            </main>

            <!-- Modal de Detalles de Juego -->
            <div id="game-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <button id="close-modal" class="close-btn">&times;</button>
                    <h2 id="modal-game-title">Título del Juego</h2>
                    <p id="modal-game-desc" class="game-description">Cargando descripción...</p>
                    
                    <div class="modal-actions">
                        <button id="download-btn" class="primary-btn">Descargar Última Versión</button>
                    </div>
                    
                    <div id="download-progress-container" style="display: none;">
                        <p id="download-status">Iniciando descarga...</p>
                        <div class="progress-bar-bg">
                            <div id="download-progress-fill" class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cargar la lógica del renderer -->
    <script src="renderer.js"></script>
</body>
</html>
